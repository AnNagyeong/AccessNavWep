<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AccessNav Web</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="phone">
    <div id="map"></div>

    <!-- 검색창 -->
    <div class="search-bar">
      <button class="icon-btn" id="backBtn">←</button>
      <input
        type="text"
        id="searchInput"
        placeholder="장소를 검색하세요"
      />
      <button class="icon-btn" id="searchBtn">⌕</button>
    </div>

    <!-- 카테고리 칩 -->
    <div class="chips">
      <button class="chip" data-keyword="택시 정류장">🚕 택시 정류장</button>
      <button class="chip" data-keyword="편의점">🏪 편의점</button>
      <button class="chip" data-keyword="카페">☕ 카페</button>
    </div>

    <!-- 검색 결과 -->
    <div id="resultList" class="result-list hidden"></div>
    
    <!-- 필터링 UI, 즐겨찾기, 현재 위치 가져오는 기능 -->
    <div class="map-control-buttons">
    <button id="favoriteBtn" class="map-control-btn">⭐</button>
    <button id="filterBtn" class="map-control-btn">⚙️</button>
    <button id="currentLocationBtn" class="map-control-btn">📍</button>
    </div>

    <!-- 필터 패널 -->
    <div id="filterPanel" class="filter-panel hidden">
  <div class="filter-map-preview"></div>

  <aside class="filter-sheet">
    <div class="filter-header">
      <h2>옵션 필터</h2>
      <button type="button" id="closeFilterBtn" class="filter-close-btn">×</button>
    </div>

    <div class="filter-options">
      <label class="filter-option">
        <span>장애인 화장실</span>
        <input type="checkbox" data-filter="disabled_toilet" />
        <span class="toggle-ui"></span>
      </label>

      <label class="filter-option">
        <span>배리어프리 매장</span>
        <input type="checkbox" data-filter="barrier_free_kiosk" />
        <span class="toggle-ui"></span>
      </label>

      <label class="filter-option">
        <span>엘리베이터</span>
        <input type="checkbox" data-filter="elevator" />
        <span class="toggle-ui"></span>
      </label>

      <label class="filter-option">
        <span>장애인 전용 주차장</span>
        <input type="checkbox" data-filter="disabled_parking" />
        <span class="toggle-ui"></span>
      </label>

      <label class="filter-option">
        <span>버스 정류장</span>
        <input type="checkbox" data-filter="bus_stop" />
        <span class="toggle-ui"></span>
      </label>
    </div>
  </aside>
</div>

    <!-- 하단 장소 시트 -->
    <<div id="placeSheet" class="bottom-sheet expanded hidden">
  <div class="sheet-handle" id="sheetHandle"></div>

  <div class="sheet-content">
    <p class="sheet-label">선택한 목적지</p>
    <h3 id="placeName">장소명</h3>
    <p id="placeAddress" class="muted">주소가 여기에 표시됩니다.</p>

    <div class="info-cards">
      <div class="info-card">
        <strong>3분</strong>
        <span>예상 시간</span>
      </div>
      <div class="info-card">
        <strong>100m</strong>
        <span>거리</span>
      </div>
      <div class="info-card danger">
        <strong>2곳</strong>
        <span>위험 구간</span>
      </div>
    </div>

    <div class="safety-bar">
      <div class="safe"></div>
      <div class="warn"></div>
    </div>

    <div class="safety-labels">
      <span>안전 20%</span>
      <span>주의 80%</span>
    </div>

    <div class="sheet-actions">
      <button class="secondary-btn" id="routeListBtn">경로 목록</button>
      <button class="primary-btn" id="startRouteBtn">안내 시작</button>
    </div>

    <button class="report-link-btn" id="reportBtn">제보하기</button>
  </div>
</div>

    <!-- 하단 네비 -->
    <nav class="bottom-nav" aria-label="하단 내비게이션">
      <button class="nav-item active" type="button" aria-label="홈">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 11.5 12 4l9 7.5" />
          <path d="M5.5 10.5V21h13V10.5" />
        </svg>
      </button>
      <button class="nav-item" type="button" aria-label="주변 장소">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 21s6-5.3 6-11a6 6 0 0 0-12 0c0 5.7 6 11 6 11Z" />
          <circle cx="12" cy="10" r="2.5" />
        </svg>
      </button>
      <button class="nav-item" type="button" id="cameraNavBtn" aria-label="위험 구간 제보">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 8h4l1.5-2h5L16 8h4v11H4Z" />
          <circle cx="12" cy="13.5" r="3.5" />
        </svg>
      </button>
      <button class="nav-item" type="button" id="bookmarkNavBtn" aria-label="즐겨찾기">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 4h12v17l-6-3.5L6 21Z" />
        </svg>
      </button>
      <button class="nav-item" type="button" id="loginNavBtn" aria-label="마이 페이지">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="8" r="4" />
          <path d="M4.5 21a7.5 7.5 0 0 1 15 0" />
        </svg>
      </button>
    </nav>
  </div>

  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=80e48dd01aae3f043d16e5ad41071f5d&libraries=services"></script>
  <script src="script.js"></script>
</body>
</html>
