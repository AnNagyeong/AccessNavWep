<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>위험 구간 제보</title>
  <link rel="stylesheet" href="./style.css" />

  <style>
    .report-layout {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #fff;
    }

    #reportMap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .report-panel {
      position: absolute;
      left: 24px;
      top: 24px;
      bottom: 24px;
      width: 470px;
      background: rgba(245, 245, 245, 0.97);
      border-radius: 30px;
      padding: 22px;
      z-index: 20;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
      overflow-y: auto;
    }

    .report-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .report-back {
      border: none;
      background: #fff;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
    }

    .report-title {
      font-size: 28px;
      font-weight: bold;
    }

    .report-place {
      background: #fff;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group select,
    .form-group textarea,
    .form-group input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 14px;
    }

    .submit-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 18px;
      font-size: 18px;
      background: #53d400;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="report-layout">
    <div id="reportMap"></div>

    <div class="report-panel">
      <div class="report-header">
        <button class="report-back" onclick="history.back()">←</button>
        <div class="report-title">위험 구간 제보</div>
      </div>

      <div class="report-place">
        <h2 id="reportPlaceName">선택 장소</h2>
        <p id="reportPlaceAddress">주소 정보 없음</p>
      </div>

      <div class="form-group">
        <label>제보 유형</label>
        <select id="reportType">
          <option>턱이 높아요</option>
          <option>길이 좁아요</option>
          <option>공사 중이에요</option>
          <option>장애물이 있어요</option>
          <option>계단이 있어요</option>
        </select>
      </div>

      <div class="form-group">
        <label>상세 설명</label>
        <textarea id="reportDetail"></textarea>
      </div>

      <div class="form-group">
        <label>사진 첨부</label>
        <input type="file" id="reportImage" />
      </div>

      <button class="submit-btn" id="submitReportBtn">제보 등록</button>
    </div>
  </div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_JAVASCRIPT_KEY&libraries=services"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const name = params.get("name") || "선택 장소";
    const address = params.get("address") || "주소 정보 없음";
    const x = Number(params.get("x")) || 127.03811;
    const y = Number(params.get("y")) || 37.56184;

    document.getElementById("reportPlaceName").textContent = name;
    document.getElementById("reportPlaceAddress").textContent = address;

    const map = new kakao.maps.Map(document.getElementById("reportMap"), {
      center: new kakao.maps.LatLng(y, x),
      level: 3
    });

    new kakao.maps.Marker({
      position: new kakao.maps.LatLng(y, x),
      map: map
    });

    document.getElementById("submitReportBtn").addEventListener("click", function () {
      const reportData = {
        name,
        address,
        x,
        y,
        type: document.getElementById("reportType").value,
        detail: document.getElementById("reportDetail").value
      };

      console.log(reportData);
      alert("제보 완료");
      location.href = "./index.html";
    });
  </script>
</body>
</html>
