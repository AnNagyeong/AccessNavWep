<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>위험 구간 제보</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }
    .phone {
      width: 390px;
      height: 844px;
      background: #fff;
      border-radius: 28px;
      overflow: hidden;
      padding: 20px 16px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    p {
      color: #666;
      font-size: 14px;
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: bold;
    }
    select, textarea, input {
      width: 100%;
      margin-bottom: 16px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 14px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 120px;
      resize: none;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      background: #48d10f;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="phone">
    <h1>위험 구간 제보</h1>
    <p id="placeInfo">선택한 위치 정보가 여기에 표시됩니다.</p>

    <label for="reportType">제보 유형</label>
    <select id="reportType">
      <option>턱이 높아요</option>
      <option>공사 중이에요</option>
      <option>길이 좁아요</option>
      <option>계단이 있어요</option>
      <option>장애물이 있어요</option>
    </select>

    <label for="detail">상세 설명</label>
    <textarea id="detail" placeholder="어떤 점이 위험한지 적어주세요."></textarea>

    <label for="image">사진 첨부</label>
    <input type="file" id="image" />

    <button onclick="submitReport()">제보 등록</button>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const name = params.get("name");
    const address = params.get("address");

    document.getElementById("placeInfo").textContent =
      `${name || "선택 장소"} / ${address || "주소 정보 없음"}`;

    function submitReport() {
      const reportData = {
        place: name,
        address: address,
        type: document.getElementById("reportType").value,
        detail: document.getElementById("detail").value
      };

      console.log("제보 데이터:", reportData);
      alert("제보가 등록되었습니다.");
      location.href = "index.html";
    }
  </script>
</body>
</html>
