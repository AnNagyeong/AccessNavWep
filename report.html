<!DOCTYPE html>

      width: 100%;

      position: absolute;

      width: 100%;

      position: absolute;
      left: 24px;
      top: 24px;
      bottom: 24px;
      width: 470px;

      padding: 22px;
      z-index: 20;

    .report-header {
      display: flex;
      align-items: center;

      margin-bottom: 18px;
    }

    .report-back {
      border: none;
      background: #fff;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    }

    .report-title {
      font-size: 28px;
      font-weight: bold;
      color: #111;
    }

    .report-place {
      background: #fff;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .report-place h2 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;

      margin: 0;
      color: #666;
      font-size: 15px;

      margin-bottom: 16px;

      display: block;

      color: #222;

      background: #fff;
    }

    .form-group textarea {
