<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AccessNav 로그인</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: #f5f6f7;
    font-family: Arial, sans-serif;
    color: #222;
    }

    .login-page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 24px;
    }

    .login-logo {
    margin-bottom: 28px;
    font-size: 44px;
    font-weight: 900;
    color: #49d000;
    letter-spacing: 0;
    text-decoration: none;
    }

    .login-box {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border: 1px solid #dadada;
      border-radius: 6px;
      padding: 24px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
    }

    .input-wrap {
      border: 1px solid #dadada;
      background: #fff;
      overflow: hidden;
    }

    .input-wrap:focus-within {
      border-color: #49d000;
    }

    .login-input {
      width: 100%;
      height: 56px;
      border: none;
      padding: 0 16px;
      font-size: 16px;
      outline: none;
    }

    .login-input + .login-input {
      border-top: 1px solid #dadada;
    }

    .login-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 14px 0 18px;
      font-size: 14px;
      color: #666;
    }

    .keep-login {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .login-submit-btn {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 4px;
      background: #49d000;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .login-submit-btn:hover {
      background: #3fbd00;
    }

    .login-links {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 22px 0 0;
      font-size: 14px;
      color: #777;
    }

    .login-links button {
      border: none;
      background: transparent;
      color: #555;
      cursor: pointer;
      font-size: 14px;
    }

    .social-login {
      width: 100%;
      max-width: 460px;
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .social-btn {
      height: 52px;
      border: 1px solid #dadada;
      border-radius: 4px;
      background: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .social-btn.google {
    background: #fff;
    border-color: #dadce0;
    color: #3c4043;
    }

    .social-btn.kakao {
    background: #fee500;
    border-color: #fee500;
    color: #191919;
    }

  .login-footer {
    margin-top: 28px;
    font-size: 12px;
    color: #999;
    text-align: center;
    }
  </style>
</head>
<body>
  <main class="login-page">
    <a class="login-logo" href="index.html">AccessNav</a>

    <section class="login-box">
      <form class="login-form" id="loginForm">
        <div class="input-wrap">
          <input class="login-input" type="email" placeholder="이메일" required />
          <input class="login-input" type="password" placeholder="비밀번호" required />
        </div>

        <div class="login-options">
          <label class="keep-login">
            <input type="checkbox" />
            <span>로그인 상태 유지</span>
          </label>
        </div>

        <button class="login-submit-btn" type="submit">로그인</button>
      </form>

      <div class="login-links">
        <button type="button">비밀번호 찾기</button>
        <span>|</span>
        <button type="button">아이디 찾기</button>
        <span>|</span>
        <button type="button">회원가입</button>
      </div>
    </section>

    <div class="social-login">
      <button class="social-btn google" type="button">Google 계정으로 로그인</button>
      <button class="social-btn kakao" type="button">카카오 계정으로 로그인</button>
    </div>

    <footer class="login-footer">
      Copyright © AccessNav. All Rights Reserved.
    </footer>
  </main>

  <script>
    document.getElementById("loginForm").addEventListener("submit", (event) => {
      event.preventDefault();
      alert("로그인 기능은 추후 서버 연동 예정입니다.");
      location.href = "index.html";
    });
  </script>
</body>
</html>
